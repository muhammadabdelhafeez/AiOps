<!DOCTYPE html>

  <script src="../../vendor/js/react-dom18.production.min.js"></script>
  <script>
    window.ReactDOM = window.ReactDOM || window.ReactDOMClient;
  </script>

  <!-- Recharts deps (local vendor) -->
  <script src="../../vendor/js/prop-types.min.js"></script>
  <script>
    window['prop-types'] = window['prop-types'] || window.PropTypes;

  <script src="../../vendor/js/Recharts.js"></script>

  <!-- Lucide Icons (local vendor) -->

  <!-- Page Styles -->

            'kfh-primary-dark': 'var(--kfh-primary-dark)',

            'kfh-gold-dark': 'var(--kfh-gold-dark)',
            'kfh-bg': 'var(--surface-bg)',
            'kfh-text': 'var(--text-primary)',
            'kfh-muted': 'var(--text-secondary)'
          },
          fontFamily: {
            sans: ['Outfit', 'Segoe UI', 'sans-serif']
          }
        }
      }
    };
  </script>
</head>
