<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications - KFH AIOps Command Center</title>

  <!-- Local Fonts -->
  <link rel="stylesheet" href="../../vendor/css/outfit-font.css">

  <!-- Shared Styles (Beyond Horizons KFH Identity) -->
  <link rel="stylesheet" href="../../shared/css/base.css">
  <link rel="stylesheet" href="../../shared/css/kfh-theme.css">

  <!-- Page Styles -->
  <link rel="stylesheet" href="applications.css">
  <link rel="stylesheet" href="../../shared/css/kfh-aiops-parity.css">
</head>
<body class="h-full overflow-hidden" style="font-family: 'Outfit', sans-serif; background: var(--surface-bg);">
  <div id="app" class="kfh-app-layout h-full">

    <!-- Sidebar -->
    <nav id="sidebar" class="kfh-sidebar">
      <!-- Logo Area -->
      <div class="kfh-sidebar-logo">
        <div class="kfh-sidebar-logo-icon">
          <span>K</span>
        </div>
        <div class="kfh-sidebar-logo-text">
          <div class="kfh-sidebar-logo-title">KFH AIOps</div>
          <div class="kfh-sidebar-logo-subtitle">COMMAND CENTER</div>
        </div>
      </div>

      <!-- Navigation -->
      <div class="kfh-sidebar-nav">
        <!-- Operations -->
        <div class="kfh-sidebar-group">
          <div class="kfh-sidebar-group-title">Operations</div>
          <div class="kfh-sidebar-group-items">
            <a href="/index.html" class="kfh-sidebar-nav-item">
              <span class="kfh-sidebar-nav-icon">📊</span>
              <span class="kfh-sidebar-nav-label">Dashboard</span>
            </a>
            <a href="/pages/incidents/incidents.html" class="kfh-sidebar-nav-item">
              <span class="kfh-sidebar-nav-icon">🔴</span>
              <span class="kfh-sidebar-nav-label">Incidents</span>
            </a>
            <a href="/pages/alerts/alerts.html" class="kfh-sidebar-nav-item">
              <span class="kfh-sidebar-nav-icon">⚠️</span>
              <span class="kfh-sidebar-nav-label">Alerts</span>
            </a>
            <a href="/pages/inventory/inventory.html" class="kfh-sidebar-nav-item">
              <span class="kfh-sidebar-nav-icon">💾</span>
              <span class="kfh-sidebar-nav-label">Inventory</span>
            </a>
          </div>
        </div>

        <!-- Intelligence -->
        <div class="kfh-sidebar-group">
          <div class="kfh-sidebar-group-title">Intelligence</div>
          <div class="kfh-sidebar-group-items">
            <a href="/pages/applications/applications.html" class="kfh-sidebar-nav-item active">
              <span class="kfh-sidebar-nav-icon">📱</span>
              <span class="kfh-sidebar-nav-label">Applications</span>
            </a>
            <a href="/pages/reports/reports.html" class="kfh-sidebar-nav-item">
              <span class="kfh-sidebar-nav-icon">📄</span>
              <span class="kfh-sidebar-nav-label">Reports</span>
            </a>
          </div>
        </div>

        <!-- Configuration -->
        <div class="kfh-sidebar-group">
          <div class="kfh-sidebar-group-title">Configuration</div>
          <div class="kfh-sidebar-group-items">
            <a href="/pages/connectors/connectors.html" class="kfh-sidebar-nav-item">
              <span class="kfh-sidebar-nav-icon">🔌</span>
              <span class="kfh-sidebar-nav-label">Connectors</span>
            </a>
            <a href="/pages/schedules/schedules.html" class="kfh-sidebar-nav-item">
              <span class="kfh-sidebar-nav-icon">⏰</span>
              <span class="kfh-sidebar-nav-label">Schedules</span>
            </a>
            <a href="/pages/users/users.html" class="kfh-sidebar-nav-item">
              <span class="kfh-sidebar-nav-icon">👥</span>
              <span class="kfh-sidebar-nav-label">User Management</span>
            </a>
            <a href="/pages/settings/settings.html" class="kfh-sidebar-nav-item">
              <span class="kfh-sidebar-nav-icon">⚙️</span>
              <span class="kfh-sidebar-nav-label">Settings</span>
            </a>
            <a href="/pages/audit/audit.html" class="kfh-sidebar-nav-item">
              <span class="kfh-sidebar-nav-icon">📋</span>
              <span class="kfh-sidebar-nav-label">Audit Logs</span>
            </a>
          </div>
        </div>
      </div>

      <!-- User Profile -->
      <div class="kfh-sidebar-user">
        <div class="kfh-sidebar-user-content">
          <div class="kfh-sidebar-user-avatar">AR</div>
          <div class="kfh-sidebar-user-info">
            <div class="kfh-sidebar-user-name">Ahmed Al-Rashid</div>
            <div class="kfh-sidebar-user-role">Platform Admin</div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="kfh-main-content">
      <!-- Top Accent Gradient -->
      <div class="kfh-top-accent"></div>

      <!-- Header (single unified header) -->
      <header class="kfh-header">
        <div class="kfh-header-content kfh-apps-header">
          <div class="kfh-header-left kfh-apps-header-left">
            <h2 class="kfh-header-title">Applications</h2>
          </div>

          <div class="kfh-header-search kfh-apps-header-search">
            <label for="globalSearch" class="sr-only">Search applications</label>
            <svg class="kfh-header-search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input id="globalSearch" type="text" placeholder="Search applications (Ctrl+K)" class="kfh-header-search-input" autocomplete="off">
          </div>

          <div class="kfh-header-right kfh-apps-header-right">
            <!-- System Status -->
            <div class="kfh-status-indicator stable">
              <span class="kfh-status-dot">
                <span class="kfh-status-dot-ping"></span>
                <span class="kfh-status-dot-core"></span>
              </span>
              <span class="kfh-status-label">SYSTEM STABLE</span>
            </div>

            <!-- Notifications -->
            <button class="kfh-icon-btn" title="Notifications" aria-label="Notifications">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
              </svg>
              <span class="kfh-icon-btn-badge"></span>
            </button>

            <!-- Add Application Button -->
            <button id="btnNew" type="button" class="flex items-center gap-2 px-4 py-2 bg-[var(--kfh-primary)] text-white text-sm font-semibold rounded-lg hover:bg-[var(--kfh-primary-dark)] transition-colors shadow-sm">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              Add Application
            </button>
          </div>
        </div>
      </header>

      <!-- Content Area -->
      <section class="kfh-content-area">
        <div id="root"></div>
      </section>
    </main>
  </div>

  <!-- React (local vendor - NO Tailwind CDN) -->
  <script src="../../vendor/js/react.production.min.js"></script>
  <script src="../../vendor/js/react-dom18.production.min.js"></script>
  <script>
    // Alias for compatibility
    window.ReactDOM = window.ReactDOM || window.ReactDOMClient;
  </script>

  <!-- Lucide Icons (local vendor) -->
  <script src="../../vendor/js/lucide.min.js"></script>

  <!-- Page Script -->
  <script src="applications.js"></script>
</body>
</html>
