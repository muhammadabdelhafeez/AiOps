# Local HTTPS profile for developer/browser testing.
# Use this profile without the deprecated local scaffold profile so PostgreSQL-backed
# identity storage remains enabled:
#   spring.profiles.active=https-local
#
# The PFX password must be supplied through SERVER_SSL_KEY_STORE_PASSWORD.
# Do not commit or log certificate passwords.

server.ssl.enabled=true
server.ssl.key-store=${SERVER_SSL_KEY_STORE:file:src/main/resources/certs/UTVDISAP01_kfhtesting_local.pfx}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}

