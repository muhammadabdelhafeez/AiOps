# Deprecated local profile.
#
# User Management is always database-backed. This file intentionally no longer
# excludes DataSource, JdbcTemplate, JPA, or Flyway auto-configuration. If this
# profile is accidentally enabled, PostgreSQL identity storage still starts and
# users are created/read from identity.users.

spring.batch.job.enabled=false
spring.quartz.job-store-type=memory

