spring.application.name=kfh-aiops-platform

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/Kfh_AiOps}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Kf#PostGressql}
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA - Flyway owns schema; Hibernate never auto-creates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Spring Batch
spring.batch.jdbc.initialize-schema=always
# ============================================
# Neo4j optional bootstrap fallback (topology metadata should be configured in Settings DB metadata)
# ============================================
spring.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:}
spring.data.neo4j.database=${NEO4J_DATABASE:neo4j}
# ============================================
# Redis optional bootstrap fallback (hot-state connector metadata should be configured in Settings DB metadata)
# ============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
# ============================================
# Causal funnel — runtime Redis client (Lettuce) + fingerprint dedup
# Connection details come from Settings (config.integration_settings → infrastructure REDIS row),
# not from spring.data.redis.* above (which is only the optional bootstrap fallback).
# ============================================
kfh.dedup.window-seconds=${KFH_DEDUP_WINDOW_SECONDS:600}
kfh.redis.command-timeout-ms=${KFH_REDIS_COMMAND_TIMEOUT_MS:2000}
kfh.redis.connect-timeout-ms=${KFH_REDIS_CONNECT_TIMEOUT_MS:3000}
# ============================================
# Settings page / UI operational defaults
# ============================================
kfh.ui.dashboard-refresh-seconds=${KFH_DASHBOARD_REFRESH_SECONDS:30}
kfh.incident.quiet-period-minutes=${KFH_INCIDENT_QUIET_PERIOD_MINUTES:15}
kfh.ai.mode=${KFH_AI_MODE:EVIDENCE_PACK_ONLY}

kfh.ai.azure-openai.default-api-version=${AZURE_OPENAI_DEFAULT_API_VERSION:2024-02-15-preview}
kfh.ai.azure-openai.embeddings.round-robin=${AZURE_OPENAI_EMBEDDINGS_ROUND_ROBIN:false}
kfh.ai.azure-openai.embeddings.endpoint=${AZURE_OPENAI_EMBEDDINGS_ENDPOINT:}
kfh.ai.azure-openai.embeddings.api-key=${AZURE_OPENAI_EMBEDDINGS_API_KEY:}
kfh.ai.azure-openai.embeddings.deployment-a=${AZURE_OPENAI_EMBEDDINGS_DEPLOYMENT_A:}
kfh.ai.azure-openai.embeddings.deployment-b=${AZURE_OPENAI_EMBEDDINGS_DEPLOYMENT_B:}
kfh.ai.azure-openai.embeddings.circuit-breaker-a=${AZURE_OPENAI_EMBEDDINGS_CB_A:unknown}
kfh.ai.azure-openai.embeddings.circuit-breaker-b=${AZURE_OPENAI_EMBEDDINGS_CB_B:unknown}
kfh.ai.azure-openai.gpt.round-robin=${AZURE_OPENAI_GPT_ROUND_ROBIN:false}
kfh.ai.azure-openai.gpt.endpoint=${AZURE_OPENAI_GPT_ENDPOINT:}
kfh.ai.azure-openai.gpt.api-key=${AZURE_OPENAI_GPT_API_KEY:}
kfh.ai.azure-openai.gpt.deployment-a=${AZURE_OPENAI_GPT_DEPLOYMENT_A:}
kfh.ai.azure-openai.gpt.deployment-b=${AZURE_OPENAI_GPT_DEPLOYMENT_B:}
kfh.ai.azure-openai.gpt.circuit-breaker-a=${AZURE_OPENAI_GPT_CB_A:unknown}
kfh.ai.azure-openai.gpt.circuit-breaker-b=${AZURE_OPENAI_GPT_CB_B:unknown}
# Optional named Azure OpenAI bootstrap fallback integrations shown in Settings as rows only when configured.
kfh.ai.azure-openai.integrations[0].name=${AZURE_OPENAI_0_NAME:}
kfh.ai.azure-openai.integrations[0].provider=${AZURE_OPENAI_0_PROVIDER:AZURE_OPENAI}
kfh.ai.azure-openai.integrations[0].purpose=${AZURE_OPENAI_0_PURPOSE:GPT}
kfh.ai.azure-openai.integrations[0].endpoint=${AZURE_OPENAI_0_ENDPOINT:}
kfh.ai.azure-openai.integrations[0].api-key=${AZURE_OPENAI_0_API_KEY:}
kfh.ai.azure-openai.integrations[0].deployment=${AZURE_OPENAI_0_DEPLOYMENT:}
kfh.ai.azure-openai.integrations[0].api-version=${AZURE_OPENAI_0_API_VERSION:${AZURE_OPENAI_DEFAULT_API_VERSION:2024-02-15-preview}}
kfh.ai.azure-openai.integrations[0].timeout-seconds=${AZURE_OPENAI_0_TIMEOUT_SECONDS:5}
kfh.ai.azure-openai.integrations[0].enabled=${AZURE_OPENAI_0_ENABLED:true}
kfh.ai.azure-openai.integrations[1].name=${AZURE_OPENAI_1_NAME:}
kfh.ai.azure-openai.integrations[1].provider=${AZURE_OPENAI_1_PROVIDER:AZURE_OPENAI}
kfh.ai.azure-openai.integrations[1].purpose=${AZURE_OPENAI_1_PURPOSE:GPT}
kfh.ai.azure-openai.integrations[1].endpoint=${AZURE_OPENAI_1_ENDPOINT:}
kfh.ai.azure-openai.integrations[1].api-key=${AZURE_OPENAI_1_API_KEY:}
kfh.ai.azure-openai.integrations[1].deployment=${AZURE_OPENAI_1_DEPLOYMENT:}
kfh.ai.azure-openai.integrations[1].api-version=${AZURE_OPENAI_1_API_VERSION:${AZURE_OPENAI_DEFAULT_API_VERSION:2024-02-15-preview}}
kfh.ai.azure-openai.integrations[1].timeout-seconds=${AZURE_OPENAI_1_TIMEOUT_SECONDS:5}
kfh.ai.azure-openai.integrations[1].enabled=${AZURE_OPENAI_1_ENABLED:true}
kfh.ai.azure-openai.integrations[2].name=${AZURE_OPENAI_2_NAME:}
kfh.ai.azure-openai.integrations[2].provider=${AZURE_OPENAI_2_PROVIDER:AZURE_OPENAI}
kfh.ai.azure-openai.integrations[2].purpose=${AZURE_OPENAI_2_PURPOSE:GPT}
kfh.ai.azure-openai.integrations[2].endpoint=${AZURE_OPENAI_2_ENDPOINT:}
kfh.ai.azure-openai.integrations[2].api-key=${AZURE_OPENAI_2_API_KEY:}
kfh.ai.azure-openai.integrations[2].deployment=${AZURE_OPENAI_2_DEPLOYMENT:}
kfh.ai.azure-openai.integrations[2].api-version=${AZURE_OPENAI_2_API_VERSION:${AZURE_OPENAI_DEFAULT_API_VERSION:2024-02-15-preview}}
kfh.ai.azure-openai.integrations[2].timeout-seconds=${AZURE_OPENAI_2_TIMEOUT_SECONDS:5}
kfh.ai.azure-openai.integrations[2].enabled=${AZURE_OPENAI_2_ENABLED:true}
# ============================================
# SharePoint optional bootstrap fallback (preferred production source: Settings DB metadata)
# ============================================
kfh.integrations.sharepoint.tenant=${SHAREPOINT_TENANT:}
kfh.integrations.sharepoint.site=${SHAREPOINT_SITE:}
kfh.integrations.sharepoint.client-id=${SHAREPOINT_CLIENT_ID:}
kfh.integrations.sharepoint.client-secret=${SHAREPOINT_CLIENT_SECRET:}
# ============================================
# Microsoft Teams optional bootstrap fallback (preferred production source: Settings DB metadata)
# ============================================
kfh.notifications.teams.mappings[0].domain=${TEAMS_DEFAULT_DOMAIN:}
kfh.notifications.teams.mappings[0].team=${TEAMS_DEFAULT_TEAM:}
kfh.notifications.teams.mappings[0].channel-name=${TEAMS_DEFAULT_CHANNEL:}
kfh.notifications.teams.mappings[0].webhook-url=${TEAMS_DEFAULT_WEBHOOK_URL:}
kfh.notifications.teams.mappings[0].enabled=${TEAMS_DEFAULT_ENABLED:false}
# ============================================
# Multi-tenancy / country scope (copilot-instructions S1, S16)
# ============================================
kfh.countries.enabled=KW,BH,EG
# ============================================
# Identity bootstrap (creates first DB-backed admin only when password is supplied)
# ============================================
kfh.identity.bootstrap.enabled=${KFH_BOOTSTRAP_ENABLED:true}
kfh.identity.bootstrap.tenant-id=${KFH_BOOTSTRAP_TENANT_ID:00000000-0000-4000-8000-000000000001}
kfh.identity.bootstrap.tenant-name=${KFH_BOOTSTRAP_TENANT_NAME:KFH Group}
kfh.identity.bootstrap.username=${KFH_BOOTSTRAP_ADMIN_USERNAME:Admin}
kfh.identity.bootstrap.password=${KFH_BOOTSTRAP_ADMIN_PASSWORD:Admin@12345}
kfh.identity.bootstrap.display-name=${KFH_BOOTSTRAP_ADMIN_DISPLAY_NAME:KFH Bootstrap Admin}
kfh.identity.bootstrap.email=${KFH_BOOTSTRAP_ADMIN_EMAIL:}
kfh.identity.bootstrap.country-code=${KFH_BOOTSTRAP_ADMIN_COUNTRY:ALL}
kfh.identity.bootstrap.environment=${KFH_BOOTSTRAP_ADMIN_ENVIRONMENT:PROD}
kfh.identity.bootstrap.role-name=${KFH_BOOTSTRAP_ADMIN_ROLE:GLOBAL_ADMIN}
# ============================================
# Security (SSRF allowlist + secret cipher master key - S16, S32.13)
# ============================================
kfh.security.master-key=${KFH_AIOPS_SECRET_KEY:}
kfh.security.master-key-file=${KFH_AIOPS_SECRET_KEY_FILE:}
kfh.security.ssrf.allowed-schemes=https
kfh.security.ssrf.allowed-host-suffixes=${KFH_SSRF_ALLOWLIST:}
# ============================================
# Streaming / Custom Index storage optional bootstrap fallback variables shown in Settings
# Preferred production source after startup: infrastructure connector metadata in config.integration_settings.
# ============================================
kfh.streaming.kafka.bootstrap-servers=${KFH_KAFKA_BOOTSTRAP_SERVERS:}
kfh.streaming.kafka.security-protocol=${KFH_KAFKA_SECURITY_PROTOCOL:SSL}
kfh.streaming.kafka.username=${KFH_KAFKA_USERNAME:}
kfh.streaming.kafka.password=${KFH_KAFKA_PASSWORD:}
kfh.index.storage.provider=${KFH_INDEX_STORAGE_PROVIDER:FILESYSTEM}
kfh.index.storage.path=${KFH_INDEX_STORAGE_PATH:/data/aiops-index}
kfh.index.storage.bucket=${KFH_INDEX_STORAGE_BUCKET:}
# Custom Index Engine tunables (CAUSAL_PIPELINE §10)
kfh.index.shards-per-day=${KFH_INDEX_SHARDS_PER_DAY:4}
kfh.index.write-batch-size=${KFH_INDEX_WRITE_BATCH_SIZE:1000}
kfh.index.search-parallelism=${KFH_INDEX_SEARCH_PARALLELISM:8}
kfh.index.retention-days.alerts=${KFH_INDEX_RETENTION_ALERTS:30}
kfh.index.retention-days.logs=${KFH_INDEX_RETENTION_LOGS:14}
kfh.index.retention-days.metrics=${KFH_INDEX_RETENTION_METRICS:7}
kfh.index.retention-days.traces=${KFH_INDEX_RETENTION_TRACES:7}
kfh.index.retention-days.changes=${KFH_INDEX_RETENTION_CHANGES:90}
kfh.index.archive.enabled=${KFH_INDEX_ARCHIVE_ENABLED:false}
kfh.index.archive.provider=${KFH_INDEX_ARCHIVE_PROVIDER:FILESYSTEM}
kfh.index.archive.path=${KFH_INDEX_ARCHIVE_PATH:/data/aiops-index-archive}
# ============================================
# Resilience4j defaults - every external call must use these (S32.7)
# ============================================
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=30s
resilience4j.circuitbreaker.configs.default.slidingWindowSize=20
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=500ms
# ============================================
# Caching (Caffeine for in-JVM; Redis for distributed - S12)
# ============================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=1h
# ============================================
# Observability (S20, S32.11)
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.health.redis.enabled=${REDIS_HEALTH_ENABLED:false}
management.health.neo4j.enabled=${NEO4J_HEALTH_ENABLED:false}
management.metrics.tags.application=kfh-aiops
# ============================================
# Logging
# ============================================
logging.level.org.kfh.aiops=INFO
logging.level.org.neo4j.driver=WARN
logging.level.com.azure=WARN
logging.pattern.level=%5p [tenant=%X{tenantId:-}, corr=%X{correlationId:-}]
# ============================================
# Server (HTTPS-only by default; override SERVER_SSL_ENABLED=false only for diagnostics)
# ============================================
server.port=${SERVER_PORT:8443}
server.ssl.enabled=${SERVER_SSL_ENABLED:true}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:file:src/main/resources/certs/UTVDISAP01_kfhtesting_local.pfx}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:kfh-123}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
logging.level.org.apache.coyote.http11.Http11Processor=WARN
# ============================================
# Static UI (Command Center SPA)
# ============================================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.mvc.static-path-pattern=/**
spring.thymeleaf.enabled=false
